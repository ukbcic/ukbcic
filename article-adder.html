<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article Adder — UK BCI Consortium (Admin)</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --clr-primary: #1E1ECC;
            --clr-blue: #2979FF;
            --clr-cyan: #5BC8FF;
            --clr-navy: #0D0F3C;
            --clr-bg: #F0F2F8;
            --clr-surface: #FFFFFF;
            --clr-border: #D8DEF2;
            --clr-text: #1A1A3E;
            --clr-muted: #5A5A8A;
            --clr-danger: #E53935;
            --clr-success: #2E7D32;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 2px 12px rgba(13, 15, 60, 0.1);
            --shadow-lg: 0 8px 32px rgba(13, 15, 60, 0.15);
            --grad-brand: linear-gradient(135deg, #1E1ECC, #2979FF, #5BC8FF);
            --ease: cubic-bezier(.4, 0, .2, 1);
            --font: 'Inter', system-ui, sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--clr-bg);
            color: var(--clr-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        img, video { max-width: 100%; display: block; }

        textarea, input, select, button { font-family: var(--font); }

        /* ── Top bar ─────────────────────────────── */
        .topbar {
            background: var(--clr-navy);
            padding: 0 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-shrink: 0;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .topbar-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            background: rgba(91, 200, 255, .2);
            border: 1px solid rgba(91, 200, 255, .35);
            color: var(--clr-cyan);
            padding: .2rem .6rem;
            border-radius: 999px;
        }

        .topbar-actions { display: flex; gap: .6rem; }

        /* ── Buttons ─────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .55rem 1.1rem;
            border-radius: var(--radius-sm);
            font-size: .85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform .15s var(--ease), box-shadow .15s var(--ease), background .15s;
            text-decoration: none;
        }

        .btn:hover { transform: translateY(-1px); }

        .btn:disabled {
            opacity: .45;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--grad-brand);
            color: #fff;
            box-shadow: 0 3px 12px rgba(30, 30, 204, .35);
        }

        .btn-primary:hover { box-shadow: 0 6px 20px rgba(41, 121, 255, .45); }

        .btn-outline {
            background: transparent;
            color: rgba(255, 255, 255, .8);
            border: 1.5px solid rgba(255, 255, 255, .3);
        }

        .btn-outline:hover {
            border-color: var(--clr-cyan);
            color: var(--clr-cyan);
        }

        .btn-ghost {
            background: rgba(255, 255, 255, .07);
            color: rgba(255, 255, 255, .7);
            border: 1px solid rgba(255, 255, 255, .12);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, .13);
            color: #fff;
        }

        .btn-sm { padding: .35rem .75rem; font-size: .78rem; }

        /* ── Layout ─────────────────────────────── */
        .workspace {
            display: grid;
            grid-template-columns: 480px 1fr;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 56px);
        }

        .builder-panel {
            overflow-y: auto;
            background: var(--clr-bg);
            border-right: 1px solid var(--clr-border);
            display: flex;
            flex-direction: column;
        }

        .preview-panel {
            overflow-y: auto;
            background: #E8EBF3;
            position: relative;
        }

        /* ── Builder panel components ─────────────────────── */
        .builder-section {
            background: var(--clr-surface);
            border-bottom: 1px solid var(--clr-border);
            padding: 1.25rem;
        }

        .builder-section-title {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--clr-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* form fields */
        label {
            display: block;
            font-size: .78rem;
            font-weight: 600;
            color: var(--clr-muted);
            margin-bottom: .35rem;
        }

        input[type=text],
        input[type=date],
        select,
        textarea {
            width: 100%;
            padding: .6rem .875rem;
            border: 1.5px solid var(--clr-border);
            border-radius: var(--radius-sm);
            background: var(--clr-bg);
            color: var(--clr-text);
            font-size: .88rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            line-height: 1.5;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--clr-blue);
            box-shadow: 0 0 0 3px rgba(41, 121, 255, .1);
            background: #fff;
        }

        textarea { resize: vertical; min-height: 80px; }

        .form-group { margin-bottom: .875rem; }
        .form-group:last-child { margin-bottom: 0; }

        /* file upload zone */
        .upload-zone {
            border: 2px dashed var(--clr-border);
            border-radius: var(--radius);
            padding: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            background: var(--clr-bg);
            position: relative;
        }

        .upload-zone:hover {
            border-color: var(--clr-blue);
            background: #EBF0FF;
        }

        .upload-zone input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
            border: none;
        }

        .upload-zone-label {
            font-size: .82rem;
            color: var(--clr-muted);
            margin-top: .3rem;
        }

        .upload-zone-icon { font-size: 1.75rem; line-height: 1; }

        .upload-preview {
            margin-top: .75rem;
            border-radius: var(--radius-sm);
            overflow: hidden;
            max-height: 140px;
            display: none;
            background: var(--clr-navy);
        }

        .upload-preview img {
            width: 100%;
            max-height: 140px;
            object-fit: cover;
        }

        .or-divider {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin: .75rem 0;
            font-size: .75rem;
            color: var(--clr-muted);
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid var(--clr-border);
        }

        /* ── Step indicators ─────────────────────────────── */
        .step-row {
            display: flex;
            align-items: center;
            gap: .75rem;
        }

        .step-status {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            font-size: .78rem;
            font-weight: 600;
            padding: .3rem .75rem;
            border-radius: 999px;
            flex-shrink: 0;
        }

        .step-status.idle {
            background: #EEEFF8;
            color: var(--clr-muted);
        }

        .step-status.loaded {
            background: #E6F4EA;
            color: var(--clr-success);
        }

        .step-filename {
            font-size: .78rem;
            color: var(--clr-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        /* ── Preview panel ─────────────────────────────── */
        .preview-header {
            background: var(--clr-surface);
            border-bottom: 1px solid var(--clr-border);
            padding: .75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .preview-label {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--clr-muted);
        }

        .preview-frame-wrap { padding: 2rem 1.25rem; }

        /* ── Card preview styles ─────────────────────────────── */
        .pv-card {
            background: #fff;
            border: 1px solid #DDE3F4;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(13, 15, 60, 0.1);
            max-width: 340px;
            display: flex;
            flex-direction: column;
            transition: transform .2s, box-shadow .2s;
        }

        .pv-card-media {
            position: relative;
            height: 200px;
            background: #0D0F3C;
            overflow: hidden;
        }

        .pv-card-media img,
        .pv-card-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pv-card-media-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,.3);
            font-size: .85rem;
        }

        .pv-card-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }

        .pv-card-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: .25rem .65rem;
            border-radius: 999px;
            align-self: flex-start;
        }

        .pv-tag-news    { background: #E8EEFF; color: #1E1ECC; }
        .pv-tag-events  { background: #E0F7F4; color: #00695C; }
        .pv-tag-update  { background: #FFF5E8; color: #AA5500; }
        .pv-tag-research{ background: #EEFFF5; color: #006633; }

        .pv-card-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #0D0F3C;
            line-height: 1.35;
            margin: 0;
        }

        .pv-card-excerpt {
            font-size: .875rem;
            color: #5A5A8A;
            line-height: 1.6;
            flex: 1;
            margin: 0;
        }

        .pv-card-meta {
            display: flex;
            align-items: center;
            gap: .4rem;
            font-size: .78rem;
            color: #5A5A8A;
            margin-top: .25rem;
        }

        .pv-card-link {
            font-size: .82rem;
            font-weight: 700;
            color: #2979FF;
            text-decoration: none;
            margin-top: .25rem;
        }

        .pv-placeholder {
            text-align: center;
            padding: 4rem 1.5rem;
            color: #5A5A8A;
        }

        .pv-placeholder-icon { font-size: 3rem; margin-bottom: .75rem; }
        .pv-placeholder p { font-size: .9rem; }

        /* ── Toast ─────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            background: var(--clr-navy);
            color: #fff;
            padding: .75rem 1.25rem;
            border-radius: var(--radius);
            font-size: .875rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            transform: translateY(80px);
            opacity: 0;
            transition: transform .3s var(--ease), opacity .3s;
            pointer-events: none;
        }

        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--clr-success); }
        .toast.error   { background: var(--clr-danger); }

        /* ── Scrollbar ─────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #C5CBE0; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #A0AAC8; }

        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; height: auto; }
            .preview-panel { display: none; }
        }
    </style>
</head>

<body>

    <!-- ── Top bar ──────────────────────────────── -->
    <header class="topbar">
        <div class="topbar-brand">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5BC8FF" stroke-width="2.5">
                <path d="M12 2a9 9 0 0 0-9 9c0 3.1 1.6 5.8 4 7.4V21h10v-2.6c2.4-1.6 4-4.3 4-7.4a9 9 0 0 0-9-9z" />
                <line x1="9" y1="21" x2="15" y2="21" />
            </svg>
            UK BCI Consortium
            <span class="topbar-badge">Article Adder</span>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-primary btn-sm" onclick="addCard()" id="add-btn" disabled>
                ＋ Add Card &amp; Download news.html
            </button>
        </div>
    </header>

    <div class="workspace">

        <!-- ══════════════════════════════════════
             LEFT — BUILDER PANEL
        ══════════════════════════════════════ -->
        <aside class="builder-panel" id="builder-panel">

            <!-- ── Step 1: Load Article ─────────────────── -->
            <div class="builder-section">
                <div class="builder-section-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                    Step 1 — Load Article
                </div>
                <div class="step-row">
                    <input type="file" id="article-input" accept=".html" style="display:none"
                        onchange="if(this.files[0]) loadArticle(this.files[0])" />
                    <button class="btn btn-outline" style="background:var(--clr-primary);border-color:var(--clr-primary);color:#fff;font-size:.82rem;padding:.45rem .9rem;"
                        onclick="document.getElementById('article-input').click()">
                        📄 Choose Article HTML
                    </button>
                    <span class="step-status idle" id="article-status">No file</span>
                </div>
                <div id="article-filename" class="step-filename" style="margin-top:.5rem;"></div>
            </div>

            <!-- ── Step 2: Load news.html ──────────────── -->
            <div class="builder-section">
                <div class="builder-section-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Step 2 — Load news.html
                </div>
                <div class="step-row">
                    <input type="file" id="news-input" accept=".html" style="display:none"
                        onchange="if(this.files[0]) loadNews(this.files[0])" />
                    <button class="btn btn-outline" style="background:var(--clr-primary);border-color:var(--clr-primary);color:#fff;font-size:.82rem;padding:.45rem .9rem;"
                        onclick="document.getElementById('news-input').click()">
                        📰 Choose news.html
                    </button>
                    <span class="step-status idle" id="news-status">No file</span>
                </div>
            </div>

            <!-- ── Card Fields ──────────────────────────── -->
            <div class="builder-section" style="flex:1;">
                <div class="builder-section-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    Card Fields
                </div>

                <!-- Media -->
                <div class="form-group">
                    <label>Card Image / Media</label>
                    <div class="upload-zone" id="card-media-zone">
                        <input type="file" id="card-media-file" accept="image/*,video/*"
                            onchange="handleMediaUpload(this)" />
                        <div class="upload-zone-icon">🖼</div>
                        <div class="upload-zone-label">Click to upload or drag image here</div>
                    </div>
                    <div class="upload-preview" id="card-media-preview">
                        <img id="card-media-preview-img" src="" alt="Card media preview" />
                    </div>
                </div>
                <div class="or-divider">or enter a path / URL</div>
                <div class="form-group">
                    <label for="f-media-url">Image / Video path or URL</label>
                    <input type="text" id="f-media-url" placeholder="assets/my-image.png"
                        oninput="cardMediaBase64=null;updatePreview()" />
                </div>

                <!-- Title -->
                <div class="form-group">
                    <label for="f-title">Card Title</label>
                    <input type="text" id="f-title" placeholder="Article title…" oninput="updatePreview()" />
                </div>

                <!-- Excerpt -->
                <div class="form-group">
                    <label for="f-excerpt">Card Excerpt</label>
                    <textarea id="f-excerpt" rows="3" placeholder="Write a short summary for the card…"
                        oninput="updatePreview()"></textarea>
                </div>

                <!-- Category -->
                <div class="form-group">
                    <label for="f-category">Category</label>
                    <select id="f-category" oninput="updatePreview()">
                        <option value="research">Research News</option>
                        <option value="funding">Funding</option>
                        <option value="media">Media</option>
                        <option value="update">Update</option>
                        <option value="events">Event Report</option>
                    </select>
                </div>

                <!-- Date -->
                <div class="form-group">
                    <label for="f-date">Publication Date</label>
                    <input type="date" id="f-date" oninput="updatePreview()" />
                </div>

                <!-- Article link path -->
                <div class="form-group" style="margin-bottom:0;">
                    <label for="f-link">Article Link Path <span style="font-weight:400;color:var(--clr-muted);">(relative from news.html)</span></label>
                    <input type="text" id="f-link" placeholder="articles/my-article.html" oninput="updatePreview()" />
                </div>
            </div>

        </aside>

        <!-- ══════════════════════════════════════
             RIGHT — LIVE PREVIEW
        ══════════════════════════════════════ -->
        <section class="preview-panel">
            <div class="preview-header">
                <span class="preview-label">Card Preview</span>
                <span style="font-size:.75rem;color:var(--clr-muted);">Updates as you type</span>
            </div>
            <div class="preview-frame-wrap">
                <div id="preview-frame">
                    <div class="pv-placeholder">
                        <div class="pv-placeholder-icon">🗞️</div>
                        <p>Load an article in Step 1<br>to see the card preview here.</p>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ════════════════════════════════════
        //  STATE
        // ════════════════════════════════════
        let newsHtmlContent = null;
        let cardMediaBase64 = null;
        let articleLoaded = false;
        let newsLoaded = false;

        const catMap = {
            research: { label: 'Research News', cls: 'tag-news',     pvCls: 'pv-tag-news'     },
            funding:  { label: 'Funding',        cls: 'tag-update',   pvCls: 'pv-tag-update'   },
            media:    { label: 'Media',           cls: 'tag-research', pvCls: 'pv-tag-research' },
            update:   { label: 'Update',          cls: 'tag-update',   pvCls: 'pv-tag-update'   },
            events:   { label: 'Event Report',    cls: 'tag-events',   pvCls: 'pv-tag-events'   },
        };

        // ════════════════════════════════════
        //  LOAD ARTICLE
        // ════════════════════════════════════
        function loadArticle(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(e.target.result, 'text/html');

                // Category
                const tagEl = doc.querySelector('.article-category-tag');
                if (tagEl) {
                    const tagText = tagEl.textContent.trim();
                    const catEntry = Object.entries(catMap).find(([, v]) => v.label === tagText);
                    if (catEntry) document.getElementById('f-category').value = catEntry[0];
                }

                // Headline → title
                const headlineEl = doc.querySelector('.article-headline');
                if (headlineEl) document.getElementById('f-title').value = headlineEl.textContent.trim();

                // Date from author meta
                const metaSpans = doc.querySelectorAll('.author-info-meta span');
                if (metaSpans[1]) {
                    const iso = parseDisplayDate(metaSpans[1].textContent.trim());
                    if (iso) document.getElementById('f-date').value = iso;
                }

                // Hero media → card media
                const heroImg = doc.querySelector('.article-hero-media-container img');
                const heroVideoSrc = doc.querySelector('.article-hero-media-container video source');

                cardMediaBase64 = null;
                document.getElementById('card-media-preview').style.display = 'none';
                document.getElementById('f-media-url').value = '';

                if (heroImg) {
                    const src = heroImg.getAttribute('src') || '';
                    if (src.startsWith('data:')) {
                        cardMediaBase64 = src;
                        document.getElementById('card-media-preview-img').src = src;
                        document.getElementById('card-media-preview').style.display = 'block';
                    } else {
                        document.getElementById('f-media-url').value = src;
                    }
                } else if (heroVideoSrc) {
                    document.getElementById('f-media-url').value = heroVideoSrc.getAttribute('src') || '';
                }

                // Article link path: articles/{filename}
                document.getElementById('f-link').value = 'articles/' + file.name;

                // Excerpt: leave blank
                document.getElementById('f-excerpt').value = '';

                // Update status
                document.getElementById('article-status').textContent = '✓ Loaded';
                document.getElementById('article-status').className = 'step-status loaded';
                document.getElementById('article-filename').textContent = file.name;
                document.getElementById('article-input').value = '';

                articleLoaded = true;
                checkEnableAddBtn();
                updatePreview();
            };
            reader.readAsText(file);
        }

        // ════════════════════════════════════
        //  LOAD NEWS.HTML
        // ════════════════════════════════════
        function loadNews(file) {
            const reader = new FileReader();
            reader.onload = e => {
                newsHtmlContent = e.target.result;
                document.getElementById('news-status').textContent = '✓ Loaded';
                document.getElementById('news-status').className = 'step-status loaded';
                document.getElementById('news-input').value = '';
                newsLoaded = true;
                checkEnableAddBtn();
                showToast('news.html loaded', 'success');
            };
            reader.readAsText(file);
        }

        function checkEnableAddBtn() {
            document.getElementById('add-btn').disabled = !(articleLoaded && newsLoaded);
        }

        // ════════════════════════════════════
        //  MEDIA UPLOAD
        // ════════════════════════════════════
        function handleMediaUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                cardMediaBase64 = e.target.result;
                document.getElementById('card-media-preview-img').src = cardMediaBase64;
                document.getElementById('card-media-preview').style.display = 'block';
                document.getElementById('f-media-url').value = '';
                updatePreview();
            };
            reader.readAsDataURL(file);
        }

        // ════════════════════════════════════
        //  PREVIEW
        // ════════════════════════════════════
        function updatePreview() {
            document.getElementById('preview-frame').innerHTML = buildPreviewHTML();
        }

        function buildPreviewHTML() {
            const title = val('f-title');
            const excerpt = val('f-excerpt');
            const mediaSrc = cardMediaBase64 || val('f-media-url');
            const date = formatDate(val('f-date'));
            const link = val('f-link') || '#';
            const cat = document.getElementById('f-category').value;
            const { label: catLabel, pvCls } = catMap[cat] || catMap.research;

            if (!title && !mediaSrc) {
                return `<div class="pv-placeholder"><div class="pv-placeholder-icon">🗞️</div><p>Load an article in Step 1<br>to see the card preview here.</p></div>`;
            }

            const mediaInner = mediaSrc
                ? (isVideo(mediaSrc)
                    ? `<video autoplay muted loop playsinline><source src="${mediaSrc}" /></video>`
                    : `<img src="${mediaSrc}" alt="${esc(title)}" />`)
                : `<div class="pv-card-media-placeholder">No media</div>`;

            return `<div class="pv-card">
  <div class="pv-card-media">${mediaInner}</div>
  <div class="pv-card-body">
    <span class="pv-card-tag ${pvCls}">${catLabel}</span>
    <h3 class="pv-card-title">${esc(title) || '<em style="opacity:.4">Title…</em>'}</h3>
    ${excerpt ? `<p class="pv-card-excerpt">${esc(excerpt)}</p>` : ''}
    ${date ? `<div class="pv-card-meta">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" />
        <line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" />
      </svg>${date}</div>` : ''}
    <a href="${esc(link)}" class="pv-card-link">Read more ›</a>
  </div>
</div>`;
        }

        // ════════════════════════════════════
        //  ADD CARD & DOWNLOAD
        // ════════════════════════════════════
        function addCard() {
            const title = val('f-title');
            if (!title) { showToast('Please enter a card title.', 'error'); return; }
            if (!newsHtmlContent) { showToast('Please load news.html first.', 'error'); return; }

            const cardHtml = buildCardExportHTML();

            // Insert as first card in .cards-grid
            const marker = '<div class="cards-grid">';
            if (!newsHtmlContent.includes(marker)) {
                showToast('Could not find .cards-grid in news.html.', 'error');
                return;
            }

            // Auto-increment card ID
            const existingIds = (newsHtmlContent.match(/id="news-(\d+)"/g) || []).length;
            const newId = existingIds; // next sequential ID

            const finalCard = cardHtml.replace('id="news-NEW"', `id="news-${newId}"`);
            const updated = newsHtmlContent.replace(marker, marker + '\n\n' + finalCard + '\n');

            triggerDownload(updated, 'news.html');
            showToast('✓ Card added — news.html downloaded', 'success');
        }

        function buildCardExportHTML() {
            const title = val('f-title');
            const excerpt = val('f-excerpt');
            const mediaSrc = cardMediaBase64 || val('f-media-url');
            const date = formatDate(val('f-date'));
            const link = val('f-link') || '#';
            const cat = document.getElementById('f-category').value;
            const { label: catLabel, cls: catCls } = catMap[cat] || catMap.research;

            let mediaHtml = '';
            if (mediaSrc) {
                mediaHtml = isVideo(mediaSrc)
                    ? `\n                        <video class="card-media" autoplay muted loop playsinline>\n                            <source src="${mediaSrc}" />\n                        </video>`
                    : `\n                        <img\n                            class="card-media"\n                            src="${mediaSrc}"\n                            alt="${esc(title)}"\n                        />`;
            }

            const excerptHtml = excerpt
                ? `\n                            <p class="card-excerpt">${esc(excerpt)}</p>`
                : '';

            const dateHtml = date ? `\n                            <div class="card-meta">\n                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">\n                                    <rect x="3" y="4" width="18" height="18" rx="2" />\n                                    <line x1="16" y1="2" x2="16" y2="6" />\n                                    <line x1="8" y1="2" x2="8" y2="6" />\n                                    <line x1="3" y1="10" x2="21" y2="10" />\n                                </svg>\n                                ${date}\n                            </div>` : '';

            return `                    <div class="card fade-in" data-category="${cat}" id="news-NEW">
                        <div class="card-media-container">${mediaHtml}
                        </div>
                        <div class="card-body">
                            <span class="card-tag ${catCls}">${catLabel}</span>
                            <h3 class="card-title">${esc(title)}</h3>${excerptHtml}${dateHtml}
                            <a href="${esc(link)}" class="card-link">Read more ›</a>
                        </div>
                    </div>`;
        }

        // ════════════════════════════════════
        //  UTILITIES
        // ════════════════════════════════════
        function val(id) { return (document.getElementById(id)?.value || '').trim(); }

        function esc(str) {
            return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function isVideo(src) {
            return !src.startsWith('data:') && /\.(mp4|webm|ogg|mov)$/i.test(src);
        }

        function formatDate(iso) {
            if (!iso) return '';
            try {
                return new Date(iso + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            } catch { return iso; }
        }

        function parseDisplayDate(str) {
            if (!str) return '';
            try {
                const d = new Date(str + ' UTC');
                if (isNaN(d.getTime())) return '';
                return d.toISOString().split('T')[0];
            } catch { return ''; }
        }

        function triggerDownload(content, filename) {
            const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function showToast(message, type = '') {
            const t = document.getElementById('toast');
            t.textContent = message;
            t.className = 'toast show' + (type ? ' ' + type : '');
            setTimeout(() => { t.className = 'toast'; }, 3500);
        }

        // ════════════════════════════════════
        //  INIT
        // ════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
            // Live preview on all inputs
            ['f-title', 'f-excerpt', 'f-category', 'f-date', 'f-link', 'f-media-url'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', updatePreview);
            });
        });
    </script>
</body>
</html>
