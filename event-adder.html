<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Adder — UK BCI Consortium (Admin)</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --clr-primary: #1E1ECC;
            --clr-blue:    #2979FF;
            --clr-cyan:    #5BC8FF;
            --clr-navy:    #0D0F3C;
            --clr-bg:      #F0F2F8;
            --clr-surface: #FFFFFF;
            --clr-border:  #D8DEF2;
            --clr-text:    #1A1A3E;
            --clr-muted:   #5A5A8A;
            --clr-danger:  #E53935;
            --clr-success: #2E7D32;
            --radius:      10px;
            --radius-sm:   6px;
            --shadow:      0 2px 12px rgba(13,15,60,0.1);
            --shadow-lg:   0 8px 32px rgba(13,15,60,0.15);
            --grad-brand:  linear-gradient(135deg,#1E1ECC,#2979FF,#5BC8FF);
            --ease:        cubic-bezier(.4,0,.2,1);
            --font:        'Inter', system-ui, sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--clr-bg);
            color: var(--clr-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        img, video { max-width: 100%; display: block; }
        textarea, input, select, button { font-family: var(--font); }

        /* ── Top bar ─────────────────────────────── */
        .topbar {
            background: var(--clr-navy);
            padding: 0 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-shrink: 0;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .topbar-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            background: rgba(91,200,255,.2);
            border: 1px solid rgba(91,200,255,.35);
            color: var(--clr-cyan);
            padding: .2rem .6rem;
            border-radius: 999px;
        }

        .topbar-actions { display: flex; gap: .6rem; }

        /* ── Buttons ─────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .55rem 1.1rem;
            border-radius: var(--radius-sm);
            font-size: .85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform .15s var(--ease), box-shadow .15s var(--ease), background .15s;
            text-decoration: none;
        }

        .btn:hover { transform: translateY(-1px); }

        .btn:disabled {
            opacity: .45;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--grad-brand);
            color: #fff;
            box-shadow: 0 3px 12px rgba(30,30,204,.35);
        }

        .btn-primary:hover { box-shadow: 0 6px 20px rgba(41,121,255,.45); }

        .btn-sm { padding: .35rem .75rem; font-size: .78rem; }

        /* ── Layout ─────────────────────────────── */
        .workspace {
            display: grid;
            grid-template-columns: 500px 1fr;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 56px);
        }

        .builder-panel {
            overflow-y: auto;
            background: var(--clr-bg);
            border-right: 1px solid var(--clr-border);
            display: flex;
            flex-direction: column;
        }

        .preview-panel {
            overflow-y: auto;
            background: #E8EBF3;
            position: relative;
        }

        /* ── Builder sections ─────────────────────────────── */
        .builder-section {
            background: var(--clr-surface);
            border-bottom: 1px solid var(--clr-border);
            padding: 1.25rem;
        }

        .builder-section-title {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--clr-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        label {
            display: block;
            font-size: .78rem;
            font-weight: 600;
            color: var(--clr-muted);
            margin-bottom: .35rem;
        }

        input[type=text],
        input[type=date],
        input[type=number],
        select,
        textarea {
            width: 100%;
            padding: .6rem .875rem;
            border: 1.5px solid var(--clr-border);
            border-radius: var(--radius-sm);
            background: var(--clr-bg);
            color: var(--clr-text);
            font-size: .88rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            line-height: 1.5;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--clr-blue);
            box-shadow: 0 0 0 3px rgba(41,121,255,.1);
            background: #fff;
        }

        input:disabled, select:disabled, textarea:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        textarea { resize: vertical; min-height: 80px; }

        .form-group { margin-bottom: .875rem; }
        .form-group:last-child { margin-bottom: 0; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: .75rem;
        }

        /* ── Step indicators ─────────────────────────────── */
        .step-row { display: flex; align-items: center; gap: .75rem; }

        .step-status {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            font-size: .78rem;
            font-weight: 600;
            padding: .3rem .75rem;
            border-radius: 999px;
            flex-shrink: 0;
        }

        .step-status.idle   { background: #EEEFF8; color: var(--clr-muted); }
        .step-status.loaded { background: #E6F4EA; color: var(--clr-success); }

        /* ── Link mode toggle ─────────────────────────────── */
        .toggle-row {
            display: flex;
            gap: .5rem;
            margin-bottom: .75rem;
        }

        .toggle-btn {
            flex: 1;
            padding: .45rem .75rem;
            border-radius: var(--radius-sm);
            font-size: .78rem;
            font-weight: 600;
            border: 1.5px solid var(--clr-border);
            background: var(--clr-bg);
            color: var(--clr-muted);
            cursor: pointer;
            transition: background .15s, border-color .15s, color .15s;
            text-align: center;
        }

        .toggle-btn.active {
            background: #EBF0FF;
            border-color: var(--clr-blue);
            color: var(--clr-primary);
        }

        /* ── Button row in action section ─────────────────────────────── */
        .action-btn-row {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
        }

        .action-btn-row .btn { flex: 1; justify-content: center; }

        /* ── Preview panel ─────────────────────────────── */
        .preview-header {
            background: var(--clr-surface);
            border-bottom: 1px solid var(--clr-border);
            padding: .75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .preview-label {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--clr-muted);
        }

        .preview-frame-wrap { padding: 2rem 1.5rem; }

        /* ── Event card preview ─────────────────────────────── */
        .pv-event-card {
            background: #fff;
            border: 1px solid #DDE3F4;
            border-radius: 12px;
            overflow: hidden;
            display: grid;
            grid-template-columns: auto 1fr;
            box-shadow: 0 2px 12px rgba(13,15,60,0.08);
            transition: transform .25s, box-shadow .25s, border-color .25s;
        }

        .pv-event-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(13,15,60,0.15);
            border-color: #2979FF;
        }

        .pv-date-col {
            background: linear-gradient(135deg,#1E1ECC,#2979FF,#5BC8FF);
            padding: 1.75rem 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 80px;
            text-align: center;
        }

        .pv-day   { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1; }
        .pv-month { font-size: .75rem; font-weight: 700; color: rgba(255,255,255,.8); letter-spacing: .08em; text-transform: uppercase; margin-top: .25rem; }
        .pv-year  { font-size: .72rem; color: rgba(255,255,255,.6); margin-top: .1rem; }

        .pv-event-body { padding: 1.35rem 1.5rem; }

        .pv-card-tag {
            display: inline-block;
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            padding: .22rem .6rem;
            border-radius: 999px;
            margin-bottom: .5rem;
        }

        .pv-tag-event   { background: #E8F7FF; color: #0066AA; }
        .pv-tag-events  { background: #E0F7F4; color: #00695C; }
        .pv-tag-news    { background: #E8EEFF; color: #1E1ECC; }
        .pv-tag-update  { background: #FFF5E8; color: #AA5500; }
        .pv-tag-research{ background: #EEFFF5; color: #006633; }

        .pv-event-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #0D0F3C;
            margin-bottom: .5rem;
            line-height: 1.35;
        }

        .pv-event-details {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: .82rem;
            color: #5A5A8A;
            margin-bottom: .65rem;
        }

        .pv-event-desc {
            font-size: .875rem;
            color: #5A5A8A;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .pv-event-actions { display: flex; gap: .65rem; flex-wrap: wrap; }

        .pv-btn-blue {
            display: inline-flex;
            align-items: center;
            padding: .45rem 1rem;
            border-radius: var(--radius-sm);
            font-size: .82rem;
            font-weight: 700;
            background: #2979FF;
            color: #fff;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(41,121,255,.3);
        }

        .pv-btn-outline {
            display: inline-flex;
            align-items: center;
            padding: .43rem .95rem;
            border-radius: var(--radius-sm);
            font-size: .82rem;
            font-weight: 700;
            background: transparent;
            color: #1A1A3E;
            text-decoration: none;
            border: 2px solid #DDE3F4;
        }

        .pv-placeholder {
            text-align: center;
            padding: 4rem 1.5rem;
            color: #5A5A8A;
        }

        .pv-placeholder-icon { font-size: 3rem; margin-bottom: .75rem; }
        .pv-placeholder p    { font-size: .9rem; }

        /* ── Toast ─────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            background: var(--clr-navy);
            color: #fff;
            padding: .75rem 1.25rem;
            border-radius: var(--radius);
            font-size: .875rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            transform: translateY(80px);
            opacity: 0;
            transition: transform .3s var(--ease), opacity .3s;
            pointer-events: none;
        }

        .toast.show    { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--clr-success); }
        .toast.error   { background: var(--clr-danger); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #C5CBE0; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #A0AAC8; }

        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; height: auto; }
            .preview-panel { display: none; }
        }
    </style>
</head>

<body>

    <!-- ── Top bar ──────────────────────────────── -->
    <header class="topbar">
        <div class="topbar-brand">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5BC8FF" stroke-width="2.5">
                <path d="M12 2a9 9 0 0 0-9 9c0 3.1 1.6 5.8 4 7.4V21h10v-2.6c2.4-1.6 4-4.3 4-7.4a9 9 0 0 0-9-9z" />
                <line x1="9" y1="21" x2="15" y2="21" />
            </svg>
            UK BCI Consortium
            <span class="topbar-badge">Event Adder</span>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-primary btn-sm" onclick="addEvent()" id="add-btn" disabled>
                ＋ Add Event &amp; Download
            </button>
        </div>
    </header>

    <div class="workspace">

        <!-- ══════════════════════════════════════
             LEFT — BUILDER PANEL
        ══════════════════════════════════════ -->
        <aside class="builder-panel">

            <!-- ── Step 1: Load events.html ─────────────────── -->
            <div class="builder-section">
                <div class="builder-section-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Step 1 — Load events.html
                </div>
                <div class="step-row">
                    <input type="file" id="events-input" accept=".html" style="display:none"
                        onchange="if(this.files[0]) loadEventsPage(this.files[0])" />
                    <button class="btn btn-sm" style="background:var(--clr-primary);color:#fff;border:none;"
                        onclick="document.getElementById('events-input').click()">
                        📅 Choose events.html
                    </button>
                    <span class="step-status idle" id="events-status">No file</span>
                </div>
            </div>

            <!-- ── Event Date ─────────────────────────────── -->
            <div class="builder-section">
                <div class="builder-section-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    Date Column
                </div>
                <div class="form-row-3">
                    <div class="form-group">
                        <label for="f-day">Day</label>
                        <input type="text" id="f-day" placeholder="e.g. 12" oninput="updatePreview()" maxlength="2" />
                    </div>
                    <div class="form-group">
                        <label for="f-month">Month</label>
                        <input type="text" id="f-month" placeholder="Jun" oninput="updatePreview()" maxlength="3" />
                    </div>
                    <div class="form-group">
                        <label for="f-year">Year</label>
                        <input type="text" id="f-year" placeholder="2026" oninput="updatePreview()" maxlength="4" />
                    </div>
                </div>
            </div>

            <!-- ── Event Details ─────────────────────────────── -->
            <div class="builder-section">
                <div class="builder-section-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="8" y1="6" x2="21" y2="6" />
                        <line x1="8" y1="12" x2="21" y2="12" />
                        <line x1="8" y1="18" x2="21" y2="18" />
                        <line x1="3" y1="6" x2="3.01" y2="6" />
                        <line x1="3" y1="12" x2="3.01" y2="12" />
                        <line x1="3" y1="18" x2="3.01" y2="18" />
                    </svg>
                    Event Details
                </div>

                <div class="form-group">
                    <label for="f-tag">Category Tag</label>
                    <input type="text" id="f-tag" placeholder="e.g. Kaggle Competition"
                        oninput="updatePreview()" />
                </div>

                <div class="form-group">
                    <label for="f-title">Event Title</label>
                    <input type="text" id="f-title" placeholder="Full event name…" oninput="updatePreview()" />
                </div>

                <div class="form-group">
                    <label for="f-id">Card ID <span style="font-weight:400;color:var(--clr-muted);">(used for anchor links)</span></label>
                    <input type="text" id="f-id" placeholder="event-my-event-2026" oninput="updatePreview()" />
                </div>

                <div class="form-group">
                    <label>Detail Pills <span style="font-weight:400;color:var(--clr-muted);">(📅 date · 📍 location · 🌐 format)</span></label>
                    <input type="text" id="f-detail-date"     placeholder="📅 June 2026"          oninput="updatePreview()" style="margin-bottom:.45rem;" />
                    <input type="text" id="f-detail-location" placeholder="📍 London, UK"          oninput="updatePreview()" style="margin-bottom:.45rem;" />
                    <input type="text" id="f-detail-format"   placeholder="🌐 Online / In-Person"  oninput="updatePreview()" />
                </div>

                <div class="form-group">
                    <label for="f-desc">Description</label>
                    <textarea id="f-desc" rows="4" placeholder="Brief summary of the event…" oninput="updatePreview()"></textarea>
                </div>
            </div>

            <!-- ── Action Button ─────────────────────────────── -->
            <div class="builder-section">
                <div class="builder-section-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                    </svg>
                    Action Button
                </div>

                <div class="form-group">
                    <label for="f-btn-text">Button Label</label>
                    <input type="text" id="f-btn-text" value="Register Now" oninput="updatePreview()" />
                </div>

                <div class="form-group">
                    <label>Link Target</label>
                    <div class="toggle-row">
                        <button class="toggle-btn active" id="toggle-manual" onclick="setLinkMode('manual')">✏️ Enter URL / path</button>
                        <button class="toggle-btn"        id="toggle-article" onclick="setLinkMode('article')">📄 Pick article file</button>
                    </div>

                    <!-- Manual URL -->
                    <div id="link-manual">
                        <input type="text" id="f-btn-link" placeholder="https://example.com or articles/my-article.html"
                            oninput="updatePreview()" />
                    </div>

                    <!-- Article picker -->
                    <div id="link-article" style="display:none;">
                        <div class="step-row">
                            <input type="file" id="article-input" accept=".html" style="display:none"
                                onchange="if(this.files[0]) pickArticle(this.files[0])" />
                            <button class="btn btn-sm" style="background:var(--clr-primary);color:#fff;border:none;"
                                onclick="document.getElementById('article-input').click()">
                                📄 Choose Article HTML
                            </button>
                            <span class="step-status idle" id="article-status">No file chosen</span>
                        </div>
                        <div style="margin-top:.5rem;font-size:.78rem;color:var(--clr-muted);" id="article-link-display"></div>
                    </div>
                </div>
            </div>

        </aside>

        <!-- ══════════════════════════════════════
             RIGHT — LIVE PREVIEW
        ══════════════════════════════════════ -->
        <section class="preview-panel">
            <div class="preview-header">
                <span class="preview-label">Event Card Preview</span>
                <span style="font-size:.75rem;color:var(--clr-muted);">Updates as you type</span>
            </div>
            <div class="preview-frame-wrap">
                <div id="preview-frame">
                    <div class="pv-placeholder">
                        <div class="pv-placeholder-icon">📅</div>
                        <p>Fill in the fields on the left<br>to preview your event card here.</p>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ════════════════════════════════════
        //  STATE
        // ════════════════════════════════════
        let eventsHtmlContent = null;
        let linkMode = 'manual';       // 'manual' | 'article'
        let articleLinkPath = '';

        // ════════════════════════════════════
        //  LOAD EVENTS.HTML
        // ════════════════════════════════════
        function loadEventsPage(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const content = e.target.result;
                if (!content.includes('events-list')) {
                    showToast('No events-list found in this file.', 'error');
                    document.getElementById('events-input').value = '';
                    return;
                }
                eventsHtmlContent = content;
                document.getElementById('events-status').textContent = '✓ Loaded';
                document.getElementById('events-status').className = 'step-status loaded';
                document.getElementById('events-input').value = '';
                document.getElementById('add-btn').disabled = false;
                showToast(file.name + ' loaded', 'success');
            };
            reader.readAsText(file);
        }

        // ════════════════════════════════════
        //  LINK MODE TOGGLE
        // ════════════════════════════════════
        function setLinkMode(mode) {
            linkMode = mode;
            document.getElementById('toggle-manual').classList.toggle('active', mode === 'manual');
            document.getElementById('toggle-article').classList.toggle('active', mode === 'article');
            document.getElementById('link-manual').style.display  = mode === 'manual'  ? '' : 'none';
            document.getElementById('link-article').style.display = mode === 'article' ? '' : 'none';
            updatePreview();
        }

        function pickArticle(file) {
            // Resolve relative path from events.html: articles/{filename}
            articleLinkPath = 'articles/' + file.name;
            document.getElementById('article-status').textContent = '✓ ' + file.name;
            document.getElementById('article-status').className = 'step-status loaded';
            document.getElementById('article-link-display').textContent = 'Link: ' + articleLinkPath;
            document.getElementById('article-input').value = '';
            updatePreview();
        }

        function getLink() {
            if (linkMode === 'article') return articleLinkPath || '#';
            return val('f-btn-link') || '#';
        }

        // ════════════════════════════════════
        //  PREVIEW
        // ════════════════════════════════════
        function updatePreview() {
            document.getElementById('preview-frame').innerHTML = buildPreviewHTML();
        }

        function buildPreviewHTML() {
            const title   = val('f-title');
            const day     = val('f-day');
            const month   = val('f-month');
            const year    = val('f-year');
            const tag     = val('f-tag');
            const detDate = val('f-detail-date');
            const detLoc  = val('f-detail-location');
            const detFmt  = val('f-detail-format');
            const desc    = val('f-desc');
            const btnText = val('f-btn-text') || 'Register Now';
            const link    = getLink();

            if (!title && !day && !month) {
                return `<div class="pv-placeholder"><div class="pv-placeholder-icon">📅</div><p>Fill in the fields on the left<br>to preview your event card here.</p></div>`;
            }

            const details = [detDate, detLoc, detFmt].filter(Boolean)
                .map(d => `<span>${esc(d)}</span>`).join('');

            return `<div class="pv-event-card">
  <div class="pv-date-col">
    ${day   ? `<div class="pv-day">${esc(day)}</div>`     : ''}
    ${month ? `<div class="pv-month">${esc(month)}</div>` : ''}
    ${year  ? `<div class="pv-year">${esc(year)}</div>`   : ''}
  </div>
  <div class="pv-event-body">
    ${tag ? `<span class="pv-card-tag pv-tag-event">${esc(tag)}</span>` : ''}
    <h3 class="pv-event-title">${esc(title) || '<em style="opacity:.4">Event title…</em>'}</h3>
    ${details ? `<div class="pv-event-details">${details}</div>` : ''}
    ${desc    ? `<p  class="pv-event-desc">${esc(desc)}</p>` : ''}
    <div class="pv-event-actions">
      <a href="${esc(link)}" class="pv-btn-blue">${esc(btnText)}</a>
    </div>
  </div>
</div>`;
        }

        // ════════════════════════════════════
        //  ADD EVENT & DOWNLOAD
        // ════════════════════════════════════
        function addEvent() {
            const title = val('f-title');
            if (!title) { showToast('Please enter an event title.', 'error'); return; }
            if (!eventsHtmlContent) { showToast('Please load events.html first.', 'error'); return; }

            const cardHtml = buildEventExportHTML();

            // Insert as first item inside #events-list (upcoming)
            const marker = 'id="events-list"';
            if (!eventsHtmlContent.includes(marker)) {
                showToast('Could not find #events-list in the loaded page.', 'error');
                return;
            }

            const insertPoint = eventsHtmlContent.indexOf('>', eventsHtmlContent.indexOf(marker)) + 1;
            const updated =
                eventsHtmlContent.slice(0, insertPoint) +
                '\n\n' + cardHtml + '\n' +
                eventsHtmlContent.slice(insertPoint);

            triggerDownload(updated, 'events.html');
            showToast('✓ Event added — events.html downloaded', 'success');
        }

        function buildEventExportHTML() {
            const title   = val('f-title');
            const day     = val('f-day');
            const month   = val('f-month');
            const year    = val('f-year');
            const tag     = val('f-tag');
            const cardId  = val('f-id') || ('event-' + title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '').slice(0, 40));
            const detDate = val('f-detail-date');
            const detLoc  = val('f-detail-location');
            const detFmt  = val('f-detail-format');
            const desc    = val('f-desc');
            const btnText = val('f-btn-text') || 'Register Now';
            const link    = getLink();

            const detailSpans = [detDate, detLoc, detFmt].filter(Boolean)
                .map(d => `                                <span class="event-detail">${esc(d)}</span>`).join('\n');

            const tagHtml = tag
                ? `                            <span class="card-tag tag-event" style="margin-bottom:0.5rem;">${esc(tag)}</span>\n`
                : '';

            const descHtml = desc
                ? `\n                            <p class="event-desc">${esc(desc)}</p>`
                : '';

            const detailsHtml = detailSpans
                ? `\n                            <div class="event-details">\n${detailSpans}\n                            </div>`
                : '';

            return `                    <div class="event-card fade-in" data-category="upcoming" id="${cardId}">
                        <div class="event-date-col">
                            <div class="event-day">${esc(day)}</div>
                            <div class="event-month">${esc(month)}</div>
                            <div class="event-year">${esc(year)}</div>
                        </div>
                        <div class="event-body">
${tagHtml}                            <h3 class="event-title">${esc(title)}</h3>${detailsHtml}${descHtml}
                            <div class="event-actions">
                                <a href="${esc(link)}" class="btn btn-blue btn-sm">${esc(btnText)}</a>
                            </div>
                        </div>
                    </div>`;
        }

        // ════════════════════════════════════
        //  UTILITIES
        // ════════════════════════════════════
        function val(id) { return (document.getElementById(id)?.value || '').trim(); }

        function esc(str) {
            return (str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function triggerDownload(content, filename) {
            const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function showToast(message, type = '') {
            const t = document.getElementById('toast');
            t.textContent = message;
            t.className = 'toast show' + (type ? ' ' + type : '');
            setTimeout(() => { t.className = 'toast'; }, 3500);
        }

        // ════════════════════════════════════
        //  INIT
        // ════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            const y = new Date().getFullYear();
            document.getElementById('f-year').value = y;

            [
                'f-day','f-month','f-year','f-tag','f-title','f-id',
                'f-detail-date','f-detail-location','f-detail-format',
                'f-desc','f-btn-text','f-btn-link'
            ].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', updatePreview);
            });
        });
    </script>
</body>
</html>
