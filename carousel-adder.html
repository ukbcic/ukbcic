<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel Adder — UK BCI Consortium (Admin)</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --clr-primary: #1E1ECC;
            --clr-blue: #2979FF;
            --clr-cyan: #5BC8FF;
            --clr-navy: #0D0F3C;
            --clr-bg: #F0F2F8;
            --clr-surface: #FFFFFF;
            --clr-border: #D8DEF2;
            --clr-text: #1A1A3E;
            --clr-muted: #5A5A8A;
            --clr-danger: #E53935;
            --clr-success: #2E7D32;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 2px 12px rgba(13, 15, 60, 0.1);
            --shadow-lg: 0 8px 32px rgba(13, 15, 60, 0.15);
            --grad-brand: linear-gradient(135deg, #1E1ECC, #2979FF, #5BC8FF);
            --ease: cubic-bezier(.4, 0, .2, 1);
            --font: 'Inter', system-ui, sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--clr-bg);
            color: var(--clr-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        img, video { max-width: 100%; display: block; }
        textarea, input, select, button { font-family: var(--font); }

        /* ── Top bar ─────────────────────────────── */
        .topbar {
            background: var(--clr-navy);
            padding: 0 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-shrink: 0;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .topbar-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            background: rgba(91, 200, 255, .2);
            border: 1px solid rgba(91, 200, 255, .35);
            color: var(--clr-cyan);
            padding: .2rem .6rem;
            border-radius: 999px;
        }

        .topbar-actions { display: flex; gap: .6rem; }

        /* ── Buttons ─────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .55rem 1.1rem;
            border-radius: var(--radius-sm);
            font-size: .85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: transform .15s var(--ease), box-shadow .15s var(--ease), background .15s;
            text-decoration: none;
        }

        .btn:hover { transform: translateY(-1px); }

        .btn:disabled {
            opacity: .45;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--grad-brand);
            color: #fff;
            box-shadow: 0 3px 12px rgba(30, 30, 204, .35);
        }

        .btn-primary:hover { box-shadow: 0 6px 20px rgba(41, 121, 255, .45); }

        .btn-sm { padding: .35rem .75rem; font-size: .78rem; }

        /* ── Layout ─────────────────────────────── */
        .workspace {
            display: grid;
            grid-template-columns: 480px 1fr;
            flex: 1;
            overflow: hidden;
            height: calc(100vh - 56px);
        }

        .builder-panel {
            overflow-y: auto;
            background: var(--clr-bg);
            border-right: 1px solid var(--clr-border);
            display: flex;
            flex-direction: column;
        }

        .preview-panel {
            overflow-y: auto;
            background: #0D0F3C;
            position: relative;
        }

        /* ── Builder panel components ─────────────────────── */
        .builder-section {
            background: var(--clr-surface);
            border-bottom: 1px solid var(--clr-border);
            padding: 1.25rem;
        }

        .builder-section-title {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--clr-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        label {
            display: block;
            font-size: .78rem;
            font-weight: 600;
            color: var(--clr-muted);
            margin-bottom: .35rem;
        }

        input[type=text],
        input[type=date],
        select,
        textarea {
            width: 100%;
            padding: .6rem .875rem;
            border: 1.5px solid var(--clr-border);
            border-radius: var(--radius-sm);
            background: var(--clr-bg);
            color: var(--clr-text);
            font-size: .88rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            line-height: 1.5;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--clr-blue);
            box-shadow: 0 0 0 3px rgba(41, 121, 255, .1);
            background: #fff;
        }

        textarea { resize: vertical; min-height: 72px; }

        .form-group { margin-bottom: .875rem; }
        .form-group:last-child { margin-bottom: 0; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .75rem;
        }

        /* file upload zone */
        .upload-zone {
            border: 2px dashed var(--clr-border);
            border-radius: var(--radius);
            padding: 1.2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            background: var(--clr-bg);
            position: relative;
        }

        .upload-zone:hover { border-color: var(--clr-blue); background: #EBF0FF; }

        .upload-zone input[type=file] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
            border: none;
        }

        .upload-zone-label { font-size: .82rem; color: var(--clr-muted); margin-top: .3rem; }
        .upload-zone-icon  { font-size: 1.75rem; line-height: 1; }

        .upload-preview {
            margin-top: .75rem;
            border-radius: var(--radius-sm);
            overflow: hidden;
            max-height: 140px;
            display: none;
            background: var(--clr-navy);
        }

        .upload-preview img { width: 100%; max-height: 140px; object-fit: cover; }

        .or-divider {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin: .75rem 0;
            font-size: .75rem;
            color: var(--clr-muted);
        }

        .or-divider::before,
        .or-divider::after { content: ''; flex: 1; border-top: 1px solid var(--clr-border); }

        /* ── Step indicators ─────────────────────────────── */
        .step-row { display: flex; align-items: center; gap: .75rem; }

        .step-status {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            font-size: .78rem;
            font-weight: 600;
            padding: .3rem .75rem;
            border-radius: 999px;
            flex-shrink: 0;
        }

        .step-status.idle   { background: #EEEFF8; color: var(--clr-muted); }
        .step-status.loaded { background: #E6F4EA; color: var(--clr-success); }

        .step-filename {
            font-size: .78rem;
            color: var(--clr-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        /* ── Preview panel ─────────────────────────────── */
        .preview-header {
            background: rgba(13, 15, 60, 0.8);
            border-bottom: 1px solid rgba(255,255,255,.1);
            padding: .75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .preview-label {
            font-size: .75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: rgba(255,255,255,.5);
        }

        .preview-frame-wrap { padding: 2rem 1.5rem; }

        /* ── Carousel slide preview ─────────────────────────────── */
        .pv-slide {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: var(--clr-navy);
            min-height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-shadow: 0 8px 40px rgba(0,0,0,.5);
        }

        .pv-slide-media {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pv-slide-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13,15,60,.95) 0%, rgba(13,15,60,.4) 50%, transparent 100%);
        }

        .pv-slide-content {
            position: relative;
            z-index: 2;
            padding: 2rem 2rem;
        }

        .pv-slide-tag {
            display: inline-block;
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .25rem .65rem;
            border-radius: 999px;
            margin-bottom: .75rem;
        }

        .pv-tag-news     { background: #E8EEFF; color: #1E1ECC; }
        .pv-tag-events   { background: #E0F7F4; color: #00695C; }
        .pv-tag-update   { background: #FFF5E8; color: #AA5500; }
        .pv-tag-research { background: #EEFFF5; color: #006633; }
        .pv-tag-event    { background: #E8F7FF; color: #0066AA; }

        .pv-slide-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.25;
            margin-bottom: .75rem;
            max-width: 560px;
        }

        .pv-slide-meta {
            font-size: .82rem;
            color: rgba(255,255,255,.65);
            display: flex;
            gap: 1.25rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .pv-slide-cta {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.25);
            color: #fff;
            padding: .55rem 1.25rem;
            border-radius: 999px;
            font-size: .85rem;
            font-weight: 700;
            text-decoration: none;
        }

        .pv-placeholder {
            text-align: center;
            padding: 5rem 1.5rem;
            color: rgba(255,255,255,.35);
        }

        .pv-placeholder-icon { font-size: 3rem; margin-bottom: .75rem; }
        .pv-placeholder p    { font-size: .9rem; }

        /* ── Toast ─────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            background: var(--clr-navy);
            color: #fff;
            padding: .75rem 1.25rem;
            border-radius: var(--radius);
            font-size: .875rem;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            transform: translateY(80px);
            opacity: 0;
            transition: transform .3s var(--ease), opacity .3s;
            pointer-events: none;
        }

        .toast.show    { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--clr-success); }
        .toast.error   { background: var(--clr-danger); }

        /* ── Scrollbar ─────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #C5CBE0; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #A0AAC8; }

        @media (max-width: 900px) {
            .workspace { grid-template-columns: 1fr; height: auto; }
            .preview-panel { display: none; }
        }
    </style>
</head>

<body>

    <!-- ── Top bar ──────────────────────────────── -->
    <header class="topbar">
        <div class="topbar-brand">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5BC8FF" stroke-width="2.5">
                <path d="M12 2a9 9 0 0 0-9 9c0 3.1 1.6 5.8 4 7.4V21h10v-2.6c2.4-1.6 4-4.3 4-7.4a9 9 0 0 0-9-9z" />
                <line x1="9" y1="21" x2="15" y2="21" />
            </svg>
            UK BCI Consortium
            <span class="topbar-badge">Carousel Adder</span>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-primary btn-sm" onclick="addSlide()" id="add-btn" disabled>
                ＋ Add Slide &amp; Download
            </button>
        </div>
    </header>

    <div class="workspace">

        <!-- ══════════════════════════════════════
             LEFT — BUILDER PANEL
        ══════════════════════════════════════ -->
        <aside class="builder-panel">

            <!-- ── Step 1: Load Article (optional) ─────────── -->
            <div class="builder-section">
                <div class="builder-section-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                    Step 1 — Load Article <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--clr-muted);font-size:.7rem;">(optional — pre-fills fields)</span>
                </div>
                <div class="step-row">
                    <input type="file" id="article-input" accept=".html" style="display:none"
                        onchange="if(this.files[0]) loadArticle(this.files[0])" />
                    <button class="btn btn-sm" style="background:var(--clr-primary);color:#fff;border:none;"
                        onclick="document.getElementById('article-input').click()">
                        📄 Choose Article HTML
                    </button>
                    <span class="step-status idle" id="article-status">No file</span>
                </div>
                <div id="article-filename" class="step-filename" style="margin-top:.5rem;"></div>
            </div>

            <!-- ── Step 2: Load page with carousel ─────────── -->
            <div class="builder-section">
                <div class="builder-section-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Step 2 — Load Page with Carousel
                </div>
                <div class="step-row">
                    <input type="file" id="page-input" accept=".html" style="display:none"
                        onchange="if(this.files[0]) loadPage(this.files[0])" />
                    <button class="btn btn-sm" style="background:var(--clr-primary);color:#fff;border:none;"
                        onclick="document.getElementById('page-input').click()">
                        🏠 Choose Page HTML
                    </button>
                    <span class="step-status idle" id="page-status">No file</span>
                </div>
                <div id="page-filename" class="step-filename" style="margin-top:.5rem;"></div>
            </div>

            <!-- ── Slide Fields ─────────────────────────────── -->
            <div class="builder-section" style="flex:1;">
                <div class="builder-section-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <circle cx="8.5" cy="8.5" r="1.5" />
                        <polyline points="21 15 16 10 5 21" />
                    </svg>
                    Slide Fields
                </div>

                <!-- Media -->
                <div class="form-group">
                    <label>Slide Background Image / Video</label>
                    <div class="upload-zone">
                        <input type="file" id="slide-media-file" accept="image/*,video/*"
                            onchange="handleMediaUpload(this)" />
                        <div class="upload-zone-icon">🖼</div>
                        <div class="upload-zone-label">Click to upload or drag here</div>
                    </div>
                    <div class="upload-preview" id="slide-media-preview">
                        <img id="slide-media-preview-img" src="" alt="Slide media preview" />
                    </div>
                </div>
                <div class="or-divider">or enter a path / URL</div>
                <div class="form-group">
                    <label for="f-media-url">Image / Video path or URL</label>
                    <input type="text" id="f-media-url" placeholder="assets/my-image.jpg"
                        oninput="slideMediaBase64=null;updatePreview()" />
                </div>

                <!-- Title -->
                <div class="form-group">
                    <label for="f-title">Slide Title</label>
                    <input type="text" id="f-title" placeholder="Slide headline…" oninput="updatePreview()" />
                </div>

                <!-- Category -->
                <div class="form-group">
                    <label for="f-category">Category Tag</label>
                    <select id="f-category" oninput="updatePreview()">
                        <option value="research">Research News</option>
                        <option value="funding">Funding</option>
                        <option value="media">Media</option>
                        <option value="update">Update</option>
                        <option value="events">Event Report</option>
                    </select>
                </div>

                <!-- Meta -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="f-date">Date</label>
                        <input type="date" id="f-date" oninput="updatePreview()" />
                    </div>
                    <div class="form-group">
                        <label for="f-institution">Institution</label>
                        <input type="text" id="f-institution" placeholder="UK BCI Consortium"
                            oninput="updatePreview()" />
                    </div>
                </div>

                <!-- CTA -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="f-cta-text">CTA Button Text</label>
                        <input type="text" id="f-cta-text" value="Read more ›" oninput="updatePreview()" />
                    </div>
                    <div class="form-group">
                        <label for="f-cta-link">CTA Link</label>
                        <input type="text" id="f-cta-link" value="events.html" oninput="updatePreview()" />
                    </div>
                </div>

            </div>

        </aside>

        <!-- ══════════════════════════════════════
             RIGHT — LIVE PREVIEW
        ══════════════════════════════════════ -->
        <section class="preview-panel">
            <div class="preview-header">
                <span class="preview-label">Slide Preview</span>
                <span style="font-size:.75rem;color:rgba(255,255,255,.4);">Updates as you type</span>
            </div>
            <div class="preview-frame-wrap">
                <div id="preview-frame">
                    <div class="pv-placeholder">
                        <div class="pv-placeholder-icon">🎠</div>
                        <p>Fill in the fields on the left<br>to preview your slide here.</p>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ════════════════════════════════════
        //  STATE
        // ════════════════════════════════════
        let pageHtmlContent = null;
        let slideMediaBase64 = null;
        let pageLoaded = false;

        const catMap = {
            research: { label: 'Research News', cls: 'tag-news',     pvCls: 'pv-tag-news'     },
            funding:  { label: 'Funding',        cls: 'tag-update',   pvCls: 'pv-tag-update'   },
            media:    { label: 'Media',           cls: 'tag-research', pvCls: 'pv-tag-research' },
            update:   { label: 'Update',          cls: 'tag-update',   pvCls: 'pv-tag-update'   },
            events:   { label: 'Event Report',    cls: 'tag-events',   pvCls: 'pv-tag-events'   },
        };

        // ════════════════════════════════════
        //  LOAD ARTICLE (optional pre-fill)
        // ════════════════════════════════════
        function loadArticle(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(e.target.result, 'text/html');

                // Category
                const tagEl = doc.querySelector('.article-category-tag');
                if (tagEl) {
                    const tagText = tagEl.textContent.trim();
                    const catEntry = Object.entries(catMap).find(([, v]) => v.label === tagText);
                    if (catEntry) document.getElementById('f-category').value = catEntry[0];
                }

                // Headline → title
                const headlineEl = doc.querySelector('.article-headline');
                if (headlineEl) document.getElementById('f-title').value = headlineEl.textContent.trim();

                // Date & institution from author meta
                const metaSpans = doc.querySelectorAll('.author-info-meta span');
                if (metaSpans[1]) {
                    const iso = parseDisplayDate(metaSpans[1].textContent.trim());
                    if (iso) document.getElementById('f-date').value = iso;
                }
                if (metaSpans[0]) document.getElementById('f-institution').value = metaSpans[0].textContent.trim();

                // Hero media → slide media
                const heroImg = doc.querySelector('.article-hero-media-container img');
                const heroVideoSrc = doc.querySelector('.article-hero-media-container video source');

                slideMediaBase64 = null;
                document.getElementById('slide-media-preview').style.display = 'none';
                document.getElementById('f-media-url').value = '';

                if (heroImg) {
                    const src = heroImg.getAttribute('src') || '';
                    if (src.startsWith('data:')) {
                        slideMediaBase64 = src;
                        document.getElementById('slide-media-preview-img').src = src;
                        document.getElementById('slide-media-preview').style.display = 'block';
                    } else {
                        document.getElementById('f-media-url').value = src;
                    }
                } else if (heroVideoSrc) {
                    document.getElementById('f-media-url').value = heroVideoSrc.getAttribute('src') || '';
                }

                // CTA link → article path
                document.getElementById('f-cta-link').value = 'articles/' + file.name;

                // Status
                document.getElementById('article-status').textContent = '✓ Loaded';
                document.getElementById('article-status').className = 'step-status loaded';
                document.getElementById('article-filename').textContent = file.name;
                document.getElementById('article-input').value = '';

                updatePreview();
                showToast('Article loaded — fields pre-filled', 'success');
            };
            reader.readAsText(file);
        }

        // ════════════════════════════════════
        //  LOAD PAGE WITH CAROUSEL
        // ════════════════════════════════════
        function loadPage(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const content = e.target.result;
                if (!content.includes('carousel-track')) {
                    showToast('No carousel-track found in this file.', 'error');
                    document.getElementById('page-input').value = '';
                    return;
                }
                pageHtmlContent = content;
                pageLoaded = true;
                document.getElementById('page-status').textContent = '✓ Loaded';
                document.getElementById('page-status').className = 'step-status loaded';
                document.getElementById('page-filename').textContent = file.name;
                document.getElementById('page-input').value = '';
                document.getElementById('add-btn').disabled = false;
                showToast(file.name + ' loaded', 'success');
            };
            reader.readAsText(file);
        }

        // ════════════════════════════════════
        //  MEDIA UPLOAD
        // ════════════════════════════════════
        function handleMediaUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                slideMediaBase64 = e.target.result;
                document.getElementById('slide-media-preview-img').src = slideMediaBase64;
                document.getElementById('slide-media-preview').style.display = 'block';
                document.getElementById('f-media-url').value = '';
                updatePreview();
            };
            reader.readAsDataURL(file);
        }

        // ════════════════════════════════════
        //  PREVIEW
        // ════════════════════════════════════
        function updatePreview() {
            document.getElementById('preview-frame').innerHTML = buildPreviewHTML();
        }

        function buildPreviewHTML() {
            const title       = val('f-title');
            const mediaSrc    = slideMediaBase64 || val('f-media-url');
            const date        = formatDate(val('f-date'));
            const institution = val('f-institution');
            const ctaText     = val('f-cta-text') || 'Read more ›';
            const ctaLink     = val('f-cta-link') || 'events.html';
            const cat         = document.getElementById('f-category').value;
            const { label: catLabel, pvCls } = catMap[cat] || catMap.research;

            if (!title && !mediaSrc) {
                return `<div class="pv-placeholder"><div class="pv-placeholder-icon">🎠</div><p>Fill in the fields on the left<br>to preview your slide here.</p></div>`;
            }

            const mediaEl = mediaSrc
                ? (isVideo(mediaSrc)
                    ? `<video class="pv-slide-media" autoplay muted loop playsinline><source src="${mediaSrc}" /></video>`
                    : `<img class="pv-slide-media" src="${mediaSrc}" alt="${esc(title)}" />`)
                : '';

            const metaItems = [
                date        ? `<span>📅 ${date}</span>` : '',
                institution ? `<span>🏫 ${esc(institution)}</span>` : '',
                catLabel    ? `<span>${catLabel}</span>` : '',
            ].filter(Boolean).join('');

            return `<div class="pv-slide">
  ${mediaEl}
  <div class="pv-slide-overlay"></div>
  <div class="pv-slide-content">
    <span class="pv-slide-tag ${pvCls}">${catLabel}</span>
    <div class="pv-slide-title">${esc(title) || '<em style="opacity:.4">Slide title…</em>'}</div>
    ${metaItems ? `<div class="pv-slide-meta">${metaItems}</div>` : ''}
    <a href="${esc(ctaLink)}" class="pv-slide-cta">${esc(ctaText)}</a>
  </div>
</div>`;
        }

        // ════════════════════════════════════
        //  ADD SLIDE & DOWNLOAD
        // ════════════════════════════════════
        function addSlide() {
            const title = val('f-title');
            if (!title) { showToast('Please enter a slide title.', 'error'); return; }
            if (!pageHtmlContent) { showToast('Please load a page in Step 2.', 'error'); return; }

            // Find the end of the opening <div class="carousel-track" ...> tag
            const trackIdx = pageHtmlContent.indexOf('class="carousel-track"');
            if (trackIdx === -1) { showToast('Could not find carousel-track in the loaded page.', 'error'); return; }
            const closingBracket = pageHtmlContent.indexOf('>', trackIdx);
            if (closingBracket === -1) { showToast('Malformed carousel-track tag.', 'error'); return; }

            const slideHtml = buildSlideExportHTML();
            const updated =
                pageHtmlContent.slice(0, closingBracket + 1) +
                '\n' + slideHtml + '\n' +
                pageHtmlContent.slice(closingBracket + 1);

            // Use the loaded page filename for the download
            const pageFilename = document.getElementById('page-filename').textContent || 'page.html';
            triggerDownload(updated, pageFilename);
            showToast('✓ Slide added — ' + pageFilename + ' downloaded', 'success');
        }

        function buildSlideExportHTML() {
            const title       = val('f-title');
            const mediaSrc    = slideMediaBase64 || val('f-media-url');
            const date        = formatDate(val('f-date'));
            const institution = val('f-institution');
            const ctaText     = val('f-cta-text') || 'Read more ›';
            const ctaLink     = val('f-cta-link') || 'events.html';
            const cat         = document.getElementById('f-category').value;
            const { label: catLabel, cls: catCls } = catMap[cat] || catMap.research;

            let mediaHtml = '';
            if (mediaSrc) {
                mediaHtml = isVideo(mediaSrc)
                    ? `\n              <video class="carousel-slide-media is-video" autoplay muted loop playsinline>\n                <source src="${mediaSrc}" />\n              </video>`
                    : `\n              <img class="carousel-slide-media" src="${mediaSrc}" alt="${esc(title)}" />`;
            }

            const metaSpans = [
                date        ? `<span>📅 ${date}</span>` : '',
                institution ? `<span>🏫 ${esc(institution)}</span>` : '',
                catLabel    ? `<span>${catLabel}</span>` : '',
            ].filter(Boolean).join('\n                  ');

            return `            <a href="${esc(ctaLink)}" class="carousel-slide" aria-label="Read: ${esc(title)}">${mediaHtml}
              <div class="carousel-slide-overlay"></div>
              <div class="carousel-slide-content">
                <span class="carousel-slide-tag ${catCls}">${catLabel}</span>
                <div class="carousel-slide-title">${esc(title)}</div>
                <div class="carousel-slide-meta">
                  ${metaSpans}
                </div>
                <div class="carousel-slide-cta">${esc(ctaText)}</div>
              </div>
            </a>`;
        }

        // ════════════════════════════════════
        //  UTILITIES
        // ════════════════════════════════════
        function val(id) { return (document.getElementById(id)?.value || '').trim(); }

        function esc(str) {
            return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function isVideo(src) {
            return !src.startsWith('data:') && /\.(mp4|webm|ogg|mov)$/i.test(src);
        }

        function formatDate(iso) {
            if (!iso) return '';
            try {
                return new Date(iso + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
            } catch { return iso; }
        }

        function parseDisplayDate(str) {
            if (!str) return '';
            try {
                const d = new Date(str + ' UTC');
                if (isNaN(d.getTime())) return '';
                return d.toISOString().split('T')[0];
            } catch { return ''; }
        }

        function triggerDownload(content, filename) {
            const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function showToast(message, type = '') {
            const t = document.getElementById('toast');
            t.textContent = message;
            t.className = 'toast show' + (type ? ' ' + type : '');
            setTimeout(() => { t.className = 'toast'; }, 3500);
        }

        // ════════════════════════════════════
        //  INIT
        // ════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
            document.getElementById('f-institution').value = 'UK BCI Consortium';
            ['f-title', 'f-category', 'f-date', 'f-institution', 'f-cta-text', 'f-cta-link', 'f-media-url'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', updatePreview);
            });
        });
    </script>
</body>
</html>
